default: &default
  url: <%= ENV["REDIS_URL"] || 'redis://localhost:6379' %>

development:
  <<: *default
  verbose: true
  queues:
    - [default, 1]   # Default queue with priority 1
    - [mailers, 2]   # Mailers queue with priority 2
    - [geocoding, 3]   # Geocoding queue with priority 3 (lower priority)
    - [maintenance, 3]   # Maintenance queue with priority 3 (lower priority)
    - [metrics, 3]   # Metrics queue with priority 3 (lower priority)
    - [notifications, 3]   # Notifications queue with priority 3 (lower priority)
    - [platform_sync, 3]   # Federation platform sync queue

test:
  <<: *default
  queues:
    - [default, 1]   # Default queue with priority 1
    - [mailers, 2]   # Mailers queue with priority 2
    - [geocoding, 3]   # Geocoding queue with priority 3 (lower priority)
    - [maintenance, 3]   # Maintenance queue with priority 3 (lower priority)
    - [metrics, 3]   # Metrics queue with priority 3 (lower priority)
    - [notifications, 3]   # Notifications queue with priority 3 (lower priority)
    - [platform_sync, 3]   # Federation platform sync queue

production:
  <<: *default
  queues:
    - [newfoundland_labrador_online_production_default, 1]   # Default queue with priority 1
    - [newfoundland_labrador_online_production_mailers, 2]   # Mailers queue with priority 2
    - [newfoundland_labrador_online_production_geocoding, 3]   # Geocoding queue with priority 3 (lower priority)
    - [newfoundland_labrador_online_production_maintenance, 3]   # Maintenance queue with priority 3 (lower priority)
    - [newfoundland_labrador_online_production_metrics, 3]   # Metrics queue with priority 3 (lower priority)
    - [newfoundland_labrador_online_production_notifications, 3]   # Notifications queue with priority 3 (lower priority)
    - [newfoundland_labrador_online_production_platform_sync, 3]   # Federation platform sync queue
